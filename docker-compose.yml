version: '3.8'

services:
  novikash-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./novikash.db
      - SECRET_KEY=your-production-secret-key-here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - LOAN_INTEREST_RATE=0.1
      - DEFAULT_REPAYMENT_DAYS=7
    volumes:
      - ./novikash.db:/app/novikash.db
      - ./uploads:/app/uploads
    restart: unless-stopped